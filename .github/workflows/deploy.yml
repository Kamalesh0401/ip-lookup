name: React CI/CD to IIS

on:
  push:
    branches:
      - master # runs when master branch is updated

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: Run tests
      - name: Run tests
        run: npm test -- --watchAll=false

      # Step 5: Build React app
      - name: Build project
        run: npm run build

      # Step 6: Upload build as artifact (so deploy job can use it)
      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: build/

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test # run only if build job succeeds

    steps:
      # Step 1: Download artifact from build job
      - name: Download build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: build/

      # Step 2: Deploy to IIS server
      - name: Deploy to IIS Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          source: "build/*"
          target: ${{ secrets.SERVER_PATH }}
          port: ${{ secrets.SERVER_PORT }}
