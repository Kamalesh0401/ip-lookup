name: Build and Deploy React App to IIS (Self-Hosted)

on:
  push:
    branches:
      - master   # triggers whenever you push to main branch

jobs:
  build-and-deploy:
    runs-on: self-hosted   # your IIS VM runner

    steps:
      # 1️⃣ Checkout source code from GitHub
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'   # or whatever version you use

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Build your React project
      - name: Build React app
        run: npm run build

      # 5️⃣ Deploy to IIS directory
      - name: Deploy to IIS
        shell: cmd
        run: |
          echo Copying build files to IIS folder...
          rmdir /s /q "C:\inetpub\wwwroot\cicdreact" || echo "IIS folder not found, creating..."
          mkdir "C:\inetpub\wwwroot\cicdreact"
          xcopy /E /I /Y "%CD%\build\*" "C:\inetpub\wwwroot\cicdreact\"
          echo ✅ Deployment completed successfully.
