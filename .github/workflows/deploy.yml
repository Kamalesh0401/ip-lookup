name: React CI/CD to IIS

on:
  push:
    branches:
      - master # runs when master branch is updated

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3
       
      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
       
      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install
       
      # Step 4: Build React app
      - name: Build project
        run: npm run build
       
      # Step 5: Upload build as artifact (so deploy job can use it)
      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: build/

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test # run only if build job succeeds
    
    steps:
      # Step 1: Download artifact from build job (FIXED: was using upload-artifact instead of download-artifact)
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: react-build
          path: build/
       
      # Step 2: Verify build files exist (optional debugging step)
      - name: List build contents
        run: |
          echo "Contents of build directory:"
          ls -la build/ || echo "Build directory not found"
       
      # Step 3: Deploy to IIS server
      - name: Deploy to IIS Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          source: "build/*"
          target: ${{ secrets.SERVER_PATH }}
          strip_components: 1  # This removes the 'build/' prefix from uploaded files
          overwrite: true      # Overwrite existing files on the server
          debug: true