name: React CI/CD to IIS

on:
  push:
    branches:
      - master # runs when master branch is updated

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3
       
      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
       
      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install
       
      # Step 4: Build React app
      - name: Build project
        run: npm run build
       
      # Step 5: Upload build as artifact (so deploy job can use it)
      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: build/

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test # run only if build job succeeds
    
    steps:
      # Step 1: Download artifact from build job (FIXED: was using upload-artifact instead of download-artifact)
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: react-build
          path: build/
       
      # Step 2: Verify build files exist (optional debugging step)
      - name: List build contents
        run: |
          echo "Contents of build directory:"
          ls -la build/ || echo "Build directory not found"
        
      # Step 2: Verify build files exist (optional debugging step)
      - name: Test Server Connection
        run: |
          echo "Testing connection to server..."
          timeout 10 bash -c "</dev/tcp/${{ secrets.SERVER_IP }}/${{ secrets.SERVER_PORT }}" && echo "Connection successful" || echo "Connection failed"

      # (inside your deploy job, before the appleboy/scp-action step)
      - name: Install debug tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y dnsutils netcat-openbsd openssh-client sshpass

      - name: Resolve DNS and show route
        env:
          HOST: ${{ secrets.SERVER_IP }}   # or SERVER_IP
        run: |
          echo "Resolve $HOST"
          nslookup $HOST || true
          echo "Host lookup (getent):"
          getent hosts $HOST || true

      - name: TCP port test (nc)
        env:
          HOST: ${{ secrets.SERVER_IP }}
          PORT: ${{ secrets.SERVER_PORT }}
        run: |
          echo "Testing TCP $HOST:$PORT"
          nc -vz $HOST $PORT || (echo "TCP connect failed" && exit 1)

      - name: SSH test (password)
        env:
          HOST: ${{ secrets.SERVER_IP }}
          PORT: ${{ secrets.SERVER_PORT }}
          USER: ${{ secrets.SERVER_USER }}
        run: |
          # Install sshpass above; then:
          sshpass -p "${{ secrets.SERVER_PASS }}" ssh -oStrictHostKeyChecking=no -oConnectTimeout=10 -p "$PORT" "$USER@$HOST" 'echo SSH_OK' || (echo "SSH handshake failed" && exit 1)

      # Step 4: Deploy to IIS server
      - name: Deploy to IIS Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          source: "build/*"
          target: ${{ secrets.SERVER_PATH }}
          port: ${{ secrets.SERVER_PORT }}
          strip_components: 1  # This removes the 'build/' prefix from uploaded files
          overwrite: true      # Overwrite existing files on the server
          debug: true