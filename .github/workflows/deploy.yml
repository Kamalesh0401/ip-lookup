name: Build and Deploy React App to IIS

on:
  push:
    branches:
      - master
  workflow_dispatch:  # allows manual trigger

env:
  NODE_VERSION: '18'
  IIS_DEPLOY_PATH: 'C:\Sites\dev\cicdreact'

jobs:
  build:
    name: Build React Application
    runs-on: self-hosted
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'  # caches npm dependencies for faster builds
      
      - name: Install dependencies
        run: npm ci --prefer-offline
      
      - name: Run tests (optional)
        run: npm test -- --passWithNoTests --watchAll=false
        continue-on-error: false
      
      - name: Build React app
        run: npm run build
        env:
          CI: false  # prevents treating warnings as errors
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: build/
          retention-days: 1
          if-no-files-found: error

  deploy:
    name: Deploy to IIS Server
    needs: build
    runs-on: self-hosted
    
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: react-build
          path: build/
      
      - name: Stop IIS Application Pool (optional)
        shell: powershell
        run: |
          $appPoolName = "dev"  # change to your app pool name
          try {
            Import-Module WebAdministration
            if (Test-Path "IIS:\AppPools\$appPoolName") {
              Stop-WebAppPool -Name $appPoolName
              Write-Host "✓ Stopped app pool: $appPoolName"
            }
          } catch {
            Write-Host "⚠ Could not stop app pool: $_"
          }
        continue-on-error: true
      
      - name: Backup existing deployment
        shell: powershell
        run: |
          $deployPath = "${{ env.IIS_DEPLOY_PATH }}"
          $backupPath = "$deployPath-backup-$(Get-Date -Format 'yyyyMMdd-HHmmss')"
          
          if (Test-Path $deployPath) {
            Write-Host "Creating backup at: $backupPath"
            Copy-Item -Path $deployPath -Destination $backupPath -Recurse -Force
            Write-Host "✓ Backup created successfully"
          } else {
            Write-Host "No existing deployment to backup"
          }
        continue-on-error: true
      
      - name: Deploy to IIS
        shell: powershell
        run: |
          $deployPath = "${{ env.IIS_DEPLOY_PATH }}"
          $sourcePath = "${{ github.workspace }}\build"
          
          Write-Host "Deploying from: $sourcePath"
          Write-Host "Deploying to: $deployPath"
          
          # Remove old files
          if (Test-Path $deployPath) {
            Write-Host "Removing old deployment..."
            Remove-Item -Path $deployPath -Recurse -Force
          }
          
          # Create directory
          New-Item -ItemType Directory -Path $deployPath -Force | Out-Null
          
          # Copy new files
          Write-Host "Copying new files..."
          Copy-Item -Path "$sourcePath\*" -Destination $deployPath -Recurse -Force
          
          Write-Host "✅ Deployment completed successfully"
          
          # Verify deployment
          $fileCount = (Get-ChildItem -Path $deployPath -Recurse -File).Count
          Write-Host "Total files deployed: $fileCount"
      
      - name: Start IIS Application Pool
        shell: powershell
        run: |
          $appPoolName = "dev"  # change to your app pool name
          try {
            Import-Module WebAdministration
            if (Test-Path "IIS:\AppPools\$appPoolName") {
              Start-WebAppPool -Name $appPoolName
              Write-Host "✓ Started app pool: $appPoolName"
            }
          } catch {
            Write-Host "⚠ Could not start app pool: $_"
          }
        continue-on-error: true
      
      - name: Verify deployment
        shell: powershell
        run: |
          $deployPath = "${{ env.IIS_DEPLOY_PATH }}"
          $indexFile = Join-Path $deployPath "index.html"
          
          if (Test-Path $indexFile) {
            Write-Host "✅ Deployment verified - index.html found"
          } else {
            Write-Host "❌ Deployment verification failed - index.html not found"
            exit 1
          }

  cleanup:
    name: Cleanup old backups
    needs: deploy
    runs-on: self-hosted
    if: always()
    
    steps:
      - name: Remove old backups
        shell: powershell
        run: |
          $backupPattern = "${{ env.IIS_DEPLOY_PATH }}-backup-*"
          $backups = Get-ChildItem -Path (Split-Path "${{ env.IIS_DEPLOY_PATH }}") -Directory -Filter "*-backup-*" | 
                     Sort-Object LastWriteTime -Descending
          
          if ($backups.Count -gt 3) {
            $backups | Select-Object -Skip 3 | ForEach-Object {
              Write-Host "Removing old backup: $($_.Name)"
              Remove-Item -Path $_.FullName -Recurse -Force
            }
            Write-Host "✓ Old backups cleaned up"
          } else {
            Write-Host "No old backups to clean up"
          }
        continue-on-error: true