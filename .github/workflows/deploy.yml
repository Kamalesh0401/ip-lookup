name: React CI/CD to IIS via WinRM

on:
  push:
    branches:
      - master # or 'main' depending on your repo

jobs:
  build:
    name: Build React App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: build/

  deploy:
    name: Deploy to IIS via WinRM
    runs-on: windows-latest
    needs: build
    env:
      IIS_HOST: ${{ secrets.IIS_HOST }}
      IIS_USER: ${{ secrets.IIS_USER }}
      IIS_PASSWORD: ${{ secrets.IIS_PASSWORD }}
      IIS_PATH: ${{ secrets.IIS_PATH }} # e.g. C:\inetpub\wwwroot\cicdreact

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: react-build
          path: build/

      - name: Verify build contents
        run: |
          Write-Host "Build folder contents:"
          Get-ChildItem -Path build

      - name: Install WinRM module
        run: |
          Install-Module -Name PSRemotingTools -Force -AllowClobber -Scope CurrentUser
          Install-Module -Name Posh-SSH -Force -AllowClobber -Scope CurrentUser

      - name: Deploy files to IIS
        shell: pwsh
        run: |
          Write-Host "Starting deployment to IIS server $env:IIS_HOST ..."

          # Securely create PSCredential object
          $secPassword = ConvertTo-SecureString $env:IIS_PASSWORD -AsPlainText -Force
          $cred = New-Object System.Management.Automation.PSCredential ($env:IIS_USER, $secPassword)

          # Test WinRM connection
          Write-Host "Testing connection to $env:IIS_HOST ..."
          Test-WSMan -ComputerName $env:IIS_HOST -ErrorAction Stop
          Write-Host "Connection successful."

          # Create a PowerShell session to remote IIS server
          $session = New-PSSession -ComputerName $env:IIS_HOST -Credential $cred -Authentication Default

          # Copy files to IIS path
          Write-Host "Copying React build files to $env:IIS_PATH ..."
          Copy-Item -Path "build/*" -Destination $env:IIS_PATH -ToSession $session -Recurse -Force

          # Optional: Restart IIS service
          Invoke-Command -Session $session -ScriptBlock {
              Write-Host "Restarting IIS..."
              iisreset
          }

          # Close session
          Remove-PSSession $session
          Write-Host "✅ Deployment completed successfully."
